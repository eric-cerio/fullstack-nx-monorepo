# Governance Framework Configuration
version: "1.2.0"

stack:
  monorepo: turborepo
  package_manager: pnpm
  frontend: nextjs-15
  backend: nestjs-11
  auth_provider: jwt
  database: postgresql
  cache: redis
  realtime: websockets
  mobile: react-native-expo
  testing:
    unit: jest
    e2e: playwright
  linting:
    eslint: flat-config
    prettier: true

thresholds:
  test_coverage: 80
  max_file_lines: 800
  max_function_lines: 50

apps:
  - landing-page
  - cms
  - mobile
  - api

roles:
  - super_admin
  - admin
  - editor
  - moderator
  - support_staff
  - viewer

conventions:
  commits: conventional
  migrations: "YYYYMMDDHHMMSS_description.sql"
  branch_pattern: "type/scope-description"

docs:
  features_dir: docs/features
  session_logs_dir: docs/session-logs

overrides_file: config/overrides.yml
